<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom's Calendar</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#0f0e0d">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- [The HTML content from your script goes here - I've kept it identical] -->
    <div class="masthead">
        <div class="masthead-left">
            <h1>Tom's Calendar</h1>
            <div class="sub" id="app-subtitle">Tom's Calendar App</div>
        </div>
        <div class="masthead-right">
            <button id="notif-btn" class="hdr-btn" onclick="toggleNotifications()">🔔 Notifications</button>
            <button class="hdr-btn" onclick="goToToday()">Today</button>
            <button class="hdr-btn" onclick="openAddEvent()">+ Event</button>
            <button class="hdr-btn" onclick="openImport()">⬆ Import</button>
            <button class="hdr-btn accent" onclick="openSettings()">⚙ Settings</button>
        </div>
    </div>

    <div class="controls">
        <div class="view-btns">
            <button class="view-btn active" data-view="month" onclick="setView('month')">Month</button>
            <button class="view-btn" data-view="week" onclick="setView('week')">Week</button>
            <button class="view-btn" data-view="day" onclick="setView('day')">Day</button>
            <button class="view-btn" data-view="list" onclick="setView('list')">List</button>
        </div>
        <div class="search-wrap">
            <input type="text" id="search-input" class="search-input" placeholder="🔍 Search events…" oninput="onSearch(this.value)" autocomplete="off">
            <button id="search-clear" class="search-clear" onclick="clearSearch()" style="display:none">✕</button>
        </div>
        <div class="nav-btns">
            <button class="nav-btn" onclick="navigatePrev()">&#8592;</button>
            <div id="period-label"></div>
            <button class="nav-btn" onclick="navigateNext()">&#8594;</button>
        </div>
    </div>

    <div class="filters" id="filters"></div>

    <div class="layout">
        <div class="cal-panel" id="cal-panel">
            <div class="cal-panel-header">
                <span class="cal-panel-title">Calendars</span>
                <button class="cal-panel-add" onclick="openAddCalendar()" title="Add calendar">+</button>
            </div>
            <div id="cal-list"></div>
        </div>
        <div class="main-area">
            <div class="calendar-wrap" id="calendar-wrap">
                <div class="day-headers">
                    <div class="day-header"></div>
                    <div class="day-header">Sun</div><div class="day-header">Mon</div>
                    <div class="day-header">Tue</div><div class="day-header">Wed</div>
                    <div class="day-header">Thu</div><div class="day-header">Fri</div>
                    <div class="day-header">Sat</div>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>
            <div class="week-wrap" id="week-wrap">
                <div class="week-day-headers" id="week-day-headers"></div>
                <div id="week-allday-row" class="week-allday-row"></div>
                <div class="week-time-grid" id="week-time-grid"></div>
            </div>
            <div class="day-wrap" id="day-wrap">
                <div class="day-header-row" id="day-header-row"></div>
                <div class="day-allday-section" id="day-allday-section" style="display:none"></div>
                <div class="day-timeline" id="day-timeline"></div>
            </div>
            <div class="list-view" id="list-view"></div>
        </div>
        <div class="sidebar">
            <div class="sidebar-tabs">
                <button class="stab active" onclick="switchSideTab('upcoming',this)">Upcoming</button>
                <button class="stab" onclick="switchSideTab('todo',this)">To-Do ✓</button>
            </div>
            <div id="side-upcoming">
                <div id="upcoming-list"></div>
            </div>
            <div id="side-todo" style="display:none">
                <div class="todo-input-wrap">
                    <textarea id="todo-input" class="todo-input" placeholder="Type anything..." rows="3"></textarea>
                    <button class="todo-add-btn" onclick="addTodo()" id="todo-add-btn">+ Add</button>
                </div>
                <div id="todo-ai-status" class="todo-ai-status"></div>
                <div id="todo-list"></div>
            </div>
        </div>
    </div>

    <!-- Modals are omitted here for brevity but should be copied from your original HTML file exactly as they were -->

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
